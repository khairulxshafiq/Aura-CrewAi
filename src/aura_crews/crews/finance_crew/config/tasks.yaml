# ═══ Finance Crew Tasks ═══
analysis_task:
  description: >
    Analyze this financial request:
    "{topic}"

    Provide:
    - Calculations (show step-by-step math)
    - Key financial metrics
    - Comparisons if applicable
    - Risk factors and assumptions
  expected_output: >
    Detailed financial analysis with step-by-step calculations,
    metrics, and risk assessment. All amounts in RM.
  agent: financial_analyst

finance_report_task:
  description: >
    Based on the analysis, create a clear finance report.
    Include:
    - Summary (key numbers highlighted)
    - Detailed breakdown
    - Recommendations
    - Next steps

    Use RM (Ringgit Malaysia) for all currency. For: {user_name}
  expected_output: >
    A clear financial report with summary, breakdown,
    and recommendations. All amounts in RM.
  agent: finance_reporter
  context:
    - analysis_task
