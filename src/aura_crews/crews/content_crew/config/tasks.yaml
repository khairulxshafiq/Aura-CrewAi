# ═══ Content Crew Tasks ═══
strategy_task:
  description: >
    Analyze this content request and create a strategy:
    Request: {topic}

    Provide:
    1. Content angle (what makes this interesting)
    2. Hook options (3 scroll-stopping hooks)
    3. Target emotion
    4. Best platform recommendation
    5. Posting time suggestion (Malaysian timezone GMT+8)
  expected_output: >
    A content strategy with hooks, angles, platform recommendation,
    and posting time.
  agent: content_strategist

writing_task:
  description: >
    Based on the strategist plan, write the actual social media post.
    Include:
    - Hook (first line that stops scrolling)
    - Caption body (engaging, authentic, Malaysian style)
    - Call-to-action (CTA)
    - 10-15 relevant hashtags
    - Suggested image/visual description

    Write in natural Malaysian style. For: {user_name}
  expected_output: >
    A complete social media post ready to publish with hook,
    caption, CTA, hashtags, and visual suggestion.
  agent: content_writer
  context:
    - strategy_task
