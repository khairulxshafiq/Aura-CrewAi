# ═══ Research Crew Tasks ═══
research_task:
  description: >
    Research this topic thoroughly:
    "{topic}"

    Find:
    - Key facts and data points
    - Current trends and developments
    - Different perspectives
    - Relevant statistics or numbers
  expected_output: >
    Comprehensive research notes with facts, data, trends,
    and multiple perspectives on the topic.
  agent: research_analyst

report_task:
  description: >
    Based on the research findings, write a clear report.
    Include:
    - Executive summary (2-3 sentences)
    - Key findings (bullet points)
    - Analysis and context
    - Actionable recommendations

    Keep it concise but thorough. For: {user_name}
  expected_output: >
    A structured research report with summary, findings,
    analysis, and recommendations.
  agent: report_writer
  context:
    - research_task
